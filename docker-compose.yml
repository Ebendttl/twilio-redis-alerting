# Spins up an isolated Redis v7 instance for the alerting pipeline. Run with: docker compose up -d
services:
  redis:
    image: redis:7.2-alpine
    container_name: alerting-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
